server { 
    listen 80; 
    server_name localhost; 
 
    location /api/ { 
        proxy_pass http://backend_local:8080; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    location /auth/ { 
        proxy_pass http://backend_local:8080/auth/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    # Main customer frontend
    location / { 
        root /usr/share/nginx/html/customer;
        try_files $uri $uri/ /index.html; 
    } 

    # Admin dashboard - fix for static assets
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
    }
    
    # Admin static assets (js, css, etc)
    location /admin/assets/ {
        alias /usr/share/nginx/html/admin/assets/;
    }

    # HR dashboard
    location /hr {
        alias /usr/share/nginx/html/hr;
        try_files $uri $uri/ /hr/index.html;
    }
    
    # HR static assets
    location /hr/assets/ {
        alias /usr/share/nginx/html/hr/assets/;
    }
}